<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاكي القدرات اللفظي - أ/ عبدالعزيز الفيفي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root { 
            --main-color: #2c3e50; 
            --bg-color: #f4f7f6; 
            --white: #ffffff; 
            --correct: #27ae60; 
            --wrong: #e74c3c;
            --passage-bg: rgba(0,0,0,0.03); /* لون افتراضي للصندوق */
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; padding: 20px; margin: 0; user-select: none; transition: background 0.5s; }
        .quiz-card { background: var(--white); width: 100%; max-width: 900px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.08); border-top: 12px solid var(--main-color); padding: 35px; position: relative; }
        .header { text-align: center; border-bottom: 2px solid #f0f0f0; margin-bottom: 25px; padding-bottom: 15px; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.02); padding: 15px 25px; border-radius: 10px; margin-bottom: 25px; border: 1px solid #eee; }
        .q-type-badge { background: var(--main-color); color: white; padding: 8px 20px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; }
        .q-text { font-size: 1.6rem; font-weight: bold; text-align: center; line-height: 1.8; color: #2c3e50; padding: 10px; border-radius: 12px; min-height: 50px; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        
        /* تنسيق صندوق النص (استيعاب المقروء) */
        .reading-passage { 
            background-color: var(--passage-bg); 
            border-right: 6px solid var(--main-color); 
            padding: 20px; 
            margin: 15px 0; 
            border-radius: 8px; 
            text-align: justify; 
            font-size: 1.2rem; 
            line-height: 1.9; 
            color: #333; 
            width: 100%; 
            box-sizing: border-box; 
            display: block;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.02);
        }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 25px; }
        .opt { padding: 20px; border: 2px solid #ecf0f1; border-radius: 12px; cursor: pointer; text-align: center; font-size: 1.3rem; background: #fff; transition: 0.2s; color: #34495e; font-weight: 600; }
        .opt:hover { border-color: var(--main-color); background: #f9fbfb; }
        .correct { background: var(--correct) !important; color: white !important; border-color: var(--correct) !important; }
        .wrong { background: var(--wrong) !important; color: white !important; border-color: var(--wrong) !important; }
        .btn { background: var(--main-color); color: white; padding: 15px 55px; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1rem; font-weight: bold; }
        .hidden { display: none !important; }
        #lock-screen { text-align: center; padding: 40px; }
        input { width: 80%; padding: 15px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 15px; text-align: center; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="quiz-card">
    <div class="header">
        <h3>ثانوية الأمير عبدالمجيد 🎓</h3>
        <h4>أ / عبدالعزيز الفيفي ✨</h4>
    </div>

    <div id="lock-screen" class="hidden">
        <h1 style="font-size: 4rem; margin: 0;">🚫</h1>
        <h2 style="color: var(--wrong);">تنبيه النظام</h2>
        <p id="lock-message" style="font-size: 1.3rem; line-height: 1.6; color: #555;"></p>
        <button class="btn" onclick="location.reload()" style="margin-top: 20px;">العودة</button>
    </div>

    <div id="start-page" style="text-align: center;">
        <p style="font-weight: bold; color: var(--main-color);">أدخل بريد منصة مدرستي لبدء التحدي</p>
        <input type="email" id="studentEmail" placeholder="sxxxxxxx@rb.moe.gov.sa">
        <br>
        <button class="btn" onclick="verifyAndStart()">دخول المنصة 🚀</button>
        <p id="status-msg" style="margin-top: 15px; font-weight: bold;"></p>
    </div>

    <div id="quiz-page" class="hidden">
        <div class="nav-bar">
            <div id="q-counter" style="font-weight: bold;"></div>
            <div id="timer" style="font-weight: 900; font-size: 1.6rem; color: var(--wrong);">45</div>
        </div>
        <div style="text-align: right; margin-bottom: 10px;">
            <span id="q-type-label" class="q-type-badge"></span>
        </div>
        <div id="question-text" class="q-text"></div>
        <div id="options-area" class="options-grid"></div>
        <div style="text-align: center; margin-top: 35px;">
            <button id="next-btn" class="btn hidden" onclick="nextQuestion()">السؤال التالي ⮕</button>
        </div>
    </div>

    <div id="result-page" class="hidden" style="text-align: center;">
        <h2 id="final-greeting"></h2>
        <div style="font-size: 5rem; font-weight: bold; margin: 25px 0; color: var(--main-color);" id="score-text"></div>
        <button class="btn" onclick="location.reload()">خروج</button>
    </div>
</div>

<script>
    // 1. الثيمات الملونة
    const themes = [
        {main: "#800000", bg: "#fdf1f1", pbg: "rgba(128, 0, 0, 0.05)"}, // ماروني
        {main: "#2c3e50", bg: "#f4f7f6", pbg: "rgba(44, 62, 80, 0.05)"}, // كحلي
        {main: "#1e3a8a", bg: "#eff6ff", pbg: "rgba(30, 58, 138, 0.05)"}, // أزرق
        {main: "#065f46", bg: "#ecfdf5", pbg: "rgba(6, 95, 70, 0.05)"},  // أخضر
        {main: "#b45309", bg: "#fffbeb", pbg: "rgba(180, 83, 9, 0.05)"}  // خشبي
    ];
    const theme = themes[Math.floor(Math.random() * themes.length)];
    document.documentElement.style.setProperty('--main-color', theme.main);
    document.documentElement.style.setProperty('--bg-color', theme.bg);
    document.documentElement.style.setProperty('--passage-bg', theme.pbg);

    // 2. مصفوفة الـ 40 سؤالاً (مع تصنيف يدوي t)
    const rawQuizData = [
        // --- تناظر لفظي (10) ---
        { t: "تناظر لفظي", q: "قاضي : محكمة", opts: ["لاعب : ملعب", "شجر : غابة", "فصل : مدرسة", "نجار : خشب"], ans: "لاعب : ملعب" },
        { t: "تناظر لفظي", q: "محراب : مسجد", opts: ["منبر : خطبة", "نافذة : غرفة", "صلاة : صيام", "حج : مكة"], ans: "نافذة : غرفة" },
        { t: "تناظر لفظي", q: "جناح : طائر", opts: ["منقار : ريش", "ماء : نهر", "شراع : سفينة", "عجلة : سيارة"], ans: "شراع : سفينة" },
        { t: "تناظر لفظي", q: "سيف : غمد", opts: ["خاتم : إصبع", "سكين : مطبخ", "نصل : حديد", "كتاب : حقيبة"], ans: "كتاب : حقيبة" },
        { t: "تناظر لفظي", q: "خيط : ثوب", opts: ["ورقة : شجر", "خرزة : سبحة", "كتاب : صفحة", "نواة : تمر"], ans: "خرزة : سبحة" },
        { t: "تناظر لفظي", q: "حمامة : سلام", opts: ["أسد : غابة", "ثعلب : مكر", "وردة : حديقة", "نخلة : رخاء"], ans: "ثعلب : مكر" },
        { t: "تناظر لفظي", q: "نوم : ليل", opts: ["عمل : نهار", "شمس : نهار", "حرارة : صيف", "صوم : رمضان"], ans: "عمل : نهار" },
        { t: "تناظر لفظي", q: "رئة : تنفس", opts: ["قلب : ضخ", "عين : ضوء", "أذن : صوت", "يد : لمس"], ans: "قلب : ضخ" },
        { t: "تناظر لفظي", q: "غصن : شجرة", opts: ["غرفة : منزل", "بحر : سمك", "طريق : سيارة", "سماء : نجم"], ans: "غرفة : منزل" },
        { t: "تناظر لفظي", q: "نحل : عسل", opts: ["بقرة : حليب", "نمل : رمل", "أسد : زئير", "صقر : مخلب"], ans: "بقرة : حليب" },

        // --- المفردة الشاذة (7) ---
        { t: "المفردة الشاذة", q: "حدد المفردة الشاذة:", opts: ["موز", "برتقال", "خيار", "تفاح"], ans: "خيار" },
        { t: "المفردة الشاذة", q: "حدد المفردة الشاذة:", opts: ["سيف", "درع", "رمح", "خنجر"], ans: "درع" },
        { t: "المفردة الشاذة", q: "حدد المفردة الشاذة:", opts: ["مكة", "الرياض", "المنامة", "القاهرة"], ans: "مكة" },
        { t: "المفردة الشاذة", q: "حدد المفردة الشاذة:", opts: ["سيارة", "دراجة", "سفينة", "طائرة"], ans: "طائرة" },
        { t: "المفردة الشاذة", q: "حدد المفردة الشاذة:", opts: ["أسد", "ذئب", "نمر", "غزال"], ans: "غزال" },
        { t: "المفردة الشاذة", q: "حدد المفردة الشاذة:", opts: ["حديد", "نحاس", "ألمنيوم", "خشب"], ans: "خشب" },
        { t: "المفردة الشاذة", q: "حدد المفردة الشاذة:", opts: ["شتاء", "صيف", "مطر", "ربيع"], ans: "مطر" },

        // --- إكمال الجمل (8) ---
        { t: "إكمال الجمل", q: "كن ...... في الشدائد، ...... في الرخاء.", opts: ["قوياً - ضعيفاً", "هادئاً - صاخباً", "صابراً - شاكراً", "حزيناً - فرحاً"], ans: "صابراً - شاكراً" },
        { t: "إكمال الجمل", q: "من ...... في صغره، ...... في كبره.", opts: ["لعب - فاز", "اجتهد - ساد", "نام - استيقظ", "تعلم - خسر"], ans: "اجتهد - ساد" },
        { t: "إكمال الجمل", q: "العلم بلا عمل كـ ...... بلا ...... .", opts: ["البحر - سمك", "الليل - قمر", "الشجر - ثمر", "البيت - باب"], ans: "الشجر - ثمر" },
        { t: "إكمال الجمل", q: "لا تجادل ...... فربما لا يفرق الناس بينكما.", opts: ["العالم", "الأحمق", "الجاهل", "الكاذب"], ans: "الأحمق" },
        { t: "إكمال الجمل", q: "يعد ...... من أعظم وسائل المعرفة في عصرنا.", opts: ["التلفاز", "المذياع", "الإنترنت", "الهاتف"], ans: "الإنترنت" },
        { t: "إكمال الجمل", q: "إذا كنت في ...... فاحفظ لسانك، وإذا كنت في ...... فاحفظ عينك.", opts: ["صلاة - شارع", "مجلس - بيت", "عمل - مدرسة", "غضب - فرح"], ans: "مجلس - بيت" },
        { t: "إكمال الجمل", q: "الابتسامة ...... دافئة، ولغة ...... عالمية.", opts: ["كلمة - يفهمها", "نظرة - جميلة", "لمسة - صامتة", "روح - صادقة"], ans: "لمسة - صامتة" },
        { t: "إكمال الجمل", q: "يجب أن يكون الفرد كـ ...... تعطي بلا مقابل.", opts: ["الشجرة", "الغيمة", "النخلة", "الوردة"], ans: "الشجرة" },

        // --- استيعاب المقروء (5) ---
        { t: "استيعاب المقروء", q: "<div class='reading-passage'>تعتبر تقنية النانو ثورة حقيقية في العلوم المعاصرة، حيث تعتمد على التعامل مع المادة بمقاييس ذرية وجزيئية متناهية الصغر.</div> الفكرة الرئيسية للنص هي:", opts: ["ماهية النانو", "تاريخ الذرة", "مخاطر الطب", "تلوث البيئة"], ans: "ماهية النانو" },
        { t: "استيعاب المقروء", q: "<div class='reading-passage'>تعد الغابات المطيرة رئة كوكب الأرض الحقيقية، فهي تعمل كمخزن هائل للكربون مما يساهم في موازنة المناخ العالمي.</div> أهمية الغابات تعود لكونها:", opts: ["منظماً للمناخ", "مصدراً للأخشاب", "أراضي زراعية", "أماكن سياحية"], ans: "منظماً للمناخ" },
        { t: "استيعاب المقروء", q: "<div class='reading-passage'>إن الأمن الغذائي لا يعني فقط توفر الطعام، بل يشمل قدرة جميع الأفراد على الوصول إليه بأسعار مناسبة وجودة صحية.</div> يشير النص إلى أن الأمن الغذائي يتأثر بـ:", opts: ["السعر والجودة", "نوعية البذور", "عدد السكان", "تنوع الوجبات"], ans: "السعر والجودة" },
        { t: "استيعاب المقروء", q: "<div class='reading-passage'>تعتبر الهوية الثقافية بمثابة البصمة التي تميز المجتمعات عن بعضها البعض، فهي تتشكل من اللغة والدين والتاريخ المشترك.</div> المقصود بالهوية الثقافية:", opts: ["البصمة المميزة", "التعصب للأفكار", "إلغاء الثقافات", "العولمة"], ans: "البصمة المميزة" },
        { t: "استيعاب المقروء", q: "<div class='reading-passage'>تحول دور المعلم في القرن الحالي من مجرد ملقن للمعلومات إلى ميسر للعملية التعليمية وموجه للطلاب نحو المعرفة.</div> أصبح دور المعلم متمثلاً في:", opts: ["ميسر وموجه", "ناقل للمعلومات", "مراقب اختبارات", "مدير إداري"], ans: "ميسر وموجه" },

        // --- الخطأ السياقي (5) ---
        { t: "الخطأ السياقي", q: "العظمة الحقيقية هي أن تكون عظيماً في تواضعك، وصغيراً في كبريائك.", opts: ["عظيماً", "تواضعك", "صغيراً", "كبريائك"], ans: "كبريائك" },
        { t: "الخطأ السياقي", q: "الكلمة الطيبة تشبه الشجرة الخبيثة، جذورها قوية وفروعها في السماء.", opts: ["الطيبة", "الخبيثة", "جذورها", "السماء"], ans: "الخبيثة" },
        { t: "الخطأ السياقي", q: "الأصدقاء الحقيقيون كالمظلة، تظهر قيمتها عندما يصفو الجو.", opts: ["الحقيقيون", "كالمظلة", "قيمتها", "يصفو"], ans: "يصفو" },
        { t: "الخطأ السياقي", q: "كتمان السر شيمة من شيم الضعفاء، وإفشاؤه دليل على القوة والتمكن.", opts: ["كتمان", "الضعفاء", "إفشاؤه", "القوة"], ans: "الضعفاء" },
        { t: "الخطأ السياقي", q: "الاعتذار عن الخطأ قوة، والاستمرار فيه حكمة لا يتقنها الكثير.", opts: ["الاعتذار", "قوة", "الاستمرار", "حكمة"], ans: "حكمة" },

        // --- الارتباط والاختلاف (5) ---
        { t: "الارتباط والاختلاف", q: "ما الكلمة التي ترتبط بكلمة (غابة):", opts: ["شوارع", "أشجار", "رمال", "مصانع"], ans: "أشجار" },
        { t: "الارتباط والاختلاف", q: "أي من الكلمات التالية تختلف في نوعها:", opts: ["طائرة", "سيارة", "سفينة", "قلم"], ans: "قلم" },
        { t: "الارتباط والاختلاف", q: "الارتباط الأقوى لـ (مدرسة) هو:", opts: ["تعليم", "لعب", "تجارة", "زراعة"], ans: "تعليم" },
        { t: "الارتباط والاختلاف", q: "الكلمة التي لا تنتمي للمجموعة:", opts: ["خاتم", "سوار", "قرط", "ثوب"], ans: "ثوب" },
        { t: "الارتباط والاختلاف", q: "العلاقة الرابطة بين (الأسد والنمر) هي:", opts: ["الافتراس", "الألفة", "السرعة", "الحجم"], ans: "الافتراس" }
    ];

    const currentModelId = "Challenge_40_Final";
    let sName, sEmail, currentIdx = 0, userScore = 0, timer, finalQuestions;

    // إعدادات Firebase
    const firebaseConfig = { apiKey: "AIzaSyBkCO7FDQXd89YDf843J4_AtvEFvzzt-R0", authDomain: "aztlg-494c3.firebaseapp.com", projectId: "aztlg-494c3", storageBucket: "aztlg-494c3.firebasestorage.app", messagingSenderId: "597051893949", appId: "1:597051893949:web:de5554ac900317a92b2fd4" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 3. التحقق ومنع الإعادة
    async function verifyAndStart() {
        const emailInput = document.getElementById('studentEmail').value.trim().toLowerCase();
        if(!emailInput.includes('@')) return alert("يرجى إدخال إيميل منصة مدرستي");
        
        document.getElementById('status-msg').innerText = "جاري التحقق من سجلاتك... ⏳";

        try {
            // أ. التأكد من أن الطالب مسموح له (موجود في allowed_students)
            const allowedDoc = await db.collection("allowed_students").doc(emailInput).get();
            if (!allowedDoc.exists) {
                showLock("هذا الإيميل غير مسجل في الكشوفات المعتمدة. يرجى مراجعة المعلم.");
                return;
            }

            sName = allowedDoc.data().name;
            sEmail = emailInput;

            // ب. التأكد من أن الطالب لم يحل هذا النموذج من قبل
            const resultCheck = await db.collection("student_results")
                .where("email", "==", sEmail)
                .where("model_id", "==", currentModelId)
                .get();

            if (!resultCheck.empty) {
                showLock(`عذراً يا ${sName}، لقد قمت بأداء هذا التحدي مسبقاً. لا يسمح بالنظام بإعادة المحاولة لضمان العدالة.`);
                return;
            }

            // إذا مر من الشروط، نبدأ
            finalQuestions = [...rawQuizData].sort(() => Math.random() - 0.5);
            document.getElementById('start-page').classList.add('hidden');
            document.getElementById('quiz-page').classList.remove('hidden');
            loadQuestion();

        } catch (e) {
            alert("حدث خطأ في الاتصال بالسيرفر، يرجى المحاولة لاحقاً.");
        }
    }

    function showLock(msg) {
        document.getElementById('start-page').classList.add('hidden');
        document.getElementById('lock-screen').classList.remove('hidden');
        document.getElementById('lock-message').innerText = msg;
    }

    function loadQuestion() {
        if(currentIdx >= finalQuestions.length) return finish();
        const data = finalQuestions[currentIdx];
        
        document.getElementById('q-counter').innerText = `سؤال ${currentIdx+1} من ${finalQuestions.length}`;
        document.getElementById('q-type-label').innerText = data.t;
        document.getElementById('question-text').innerHTML = data.q;
        document.getElementById('next-btn').classList.add('hidden');
        
        const box = document.getElementById('options-area'); box.innerHTML = '';
        [...data.opts].sort(() => Math.random() - 0.5).forEach(o => {
            const d = document.createElement('div'); d.className = 'opt'; d.innerText = o;
            d.onclick = () => {
                clearInterval(timer);
                if(o === data.ans) userScore++;
                document.querySelectorAll('.opt').forEach(el => {
                    el.onclick = null;
                    if(el.innerText === data.ans) el.classList.add('correct');
                    else if(el.innerText === o) el.classList.add('wrong');
                });
                document.getElementById('next-btn').classList.remove('hidden');
            };
            box.appendChild(d);
        });
        startTimer();
    }

    function startTimer() {
        let s = 45; document.getElementById('timer').innerText = s;
        clearInterval(timer);
        timer = setInterval(() => {
            s--; document.getElementById('timer').innerText = s;
            if(s<=0) { clearInterval(timer); nextQuestion(); }
        }, 1000);
    }

    function nextQuestion() { currentIdx++; loadQuestion(); }

    async function finish() {
        document.getElementById('quiz-page').classList.add('hidden');
        document.getElementById('result-page').classList.remove('hidden');
        document.getElementById('final-greeting').innerText = `كفو يا ${sName}، تم تسجيل نتيجتك.`;
        document.getElementById('score-text').innerText = `${userScore} / ${finalQuestions.length}`;
        
        // حفظ النتيجة في Firebase لمنع الإعادة لاحقاً
        await db.collection("student_results").add({ 
            name: sName, email: sEmail, score: userScore, total: finalQuestions.length, 
            model_id: currentModelId, time: firebase.firestore.FieldValue.serverTimestamp() 
        });
    }
</script>
</body>
</html>
