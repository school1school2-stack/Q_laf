<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاكي القدرات اللفظي - أ/ عبدالعزيز الفيفي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root { 
            --main-color: #2c3e50; 
            --bg-color: #f4f7f6; 
            --white: #ffffff; 
            --correct: #27ae60; 
            --wrong: #e74c3c;
            --passage-bg: rgba(0,0,0,0.03);
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; padding: 20px; margin: 0; user-select: none; transition: background 0.5s; }
        .quiz-card { background: var(--white); width: 100%; max-width: 900px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.08); border-top: 12px solid var(--main-color); padding: 35px; position: relative; }
        .header { text-align: center; border-bottom: 2px solid #f0f0f0; margin-bottom: 25px; padding-bottom: 15px; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.02); padding: 15px 25px; border-radius: 10px; margin-bottom: 25px; border: 1px solid #eee; }
        
        /* تسيق اسم المتحدي */
        .challenger-box { color: var(--main-color); font-weight: bold; border-right: 3px solid var(--main-color); padding-right: 10px; }
        
        .q-type-badge { background: var(--main-color); color: white; padding: 8px 20px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; }
        .q-text { font-size: 1.6rem; font-weight: bold; text-align: center; line-height: 1.8; color: #2c3e50; padding: 10px; border-radius: 12px; min-height: 50px; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        
        .reading-passage { 
            background-color: var(--passage-bg); border-right: 6px solid var(--main-color); 
            padding: 20px; margin: 15px 0; border-radius: 8px; text-align: justify; 
            font-size: 1.2rem; line-height: 1.9; color: #333; width: 100%; box-sizing: border-box; display: block;
        }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 25px; }
        .opt { padding: 20px; border: 2px solid #ecf0f1; border-radius: 12px; cursor: pointer; text-align: center; font-size: 1.3rem; background: #fff; transition: 0.2s; color: #34495e; font-weight: 600; }
        .opt:hover { border-color: var(--main-color); background: #f9fbfb; }
        .correct { background: var(--correct) !important; color: white !important; border-color: var(--correct) !important; }
        .wrong { background: var(--wrong) !important; color: white !important; border-color: var(--wrong) !important; }
        .btn { background: var(--main-color); color: white; padding: 15px 55px; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1rem; font-weight: bold; }
        .hidden { display: none !important; }
        input { width: 80%; padding: 15px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 15px; text-align: center; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="quiz-card">
    <div class="header">
        <h3>ثانوية الأمير عبدالمجيد 🎓</h3>
        <h4>أ / عبدالعزيز الفيفي ✨</h4>
    </div>

    <div id="lock-screen" class="hidden" style="text-align: center; padding: 40px;">
        <h1 style="font-size: 4rem; margin: 0;">🚫</h1>
        <h2 style="color: var(--wrong);">تنبيه النظام</h2>
        <p id="lock-message" style="font-size: 1.3rem; line-height: 1.6; color: #555;"></p>
        <button class="btn" onclick="location.reload()" style="margin-top: 20px;">العودة</button>
    </div>

    <div id="start-page" style="text-align: center;">
        <p style="font-weight: bold; color: var(--main-color);">أدخل بريد منصة مدرستي لبدء التحدي</p>
        <input type="email" id="studentEmail" placeholder="sxxxxxxx@rb.moe.gov.sa">
        <br>
        <button class="btn" onclick="verifyAndStart()">دخول المنصة 🚀</button>
        <p id="status-msg" style="margin-top: 15px; font-weight: bold;"></p>
    </div>

    <div id="quiz-page" class="hidden">
        <div class="nav-bar">
            <div id="q-counter" style="font-weight: bold;"></div>
            <div id="challenger-display" class="challenger-box"></div> <div id="timer" style="font-weight: 900; font-size: 1.6rem; color: var(--wrong);">45</div>
        </div>
        <div style="text-align: right; margin-bottom: 10px;">
            <span id="q-type-label" class="q-type-badge"></span>
        </div>
        <div id="question-text" class="q-text"></div>
        <div id="options-area" class="options-grid"></div>
        <div style="text-align: center; margin-top: 35px;">
            <button id="next-btn" class="btn hidden" onclick="nextQuestion()">السؤال التالي ⮕</button>
        </div>
    </div>

    <div id="result-page" class="hidden" style="text-align: center;">
        <h2 id="final-greeting"></h2>
        <div style="font-size: 5rem; font-weight: bold; margin: 25px 0; color: var(--main-color);" id="score-text"></div>
        <button class="btn" onclick="location.reload()">خروج</button>
    </div>
</div>

<script>
    // 1. نظام الثيمات
    const themes = [
        {main: "#800000", bg: "#fdf1f1", pbg: "rgba(128, 0, 0, 0.05)"},
        {main: "#2c3e50", bg: "#f4f7f6", pbg: "rgba(44, 62, 80, 0.05)"},
        {main: "#1e3a8a", bg: "#eff6ff", pbg: "rgba(30, 58, 138, 0.05)"},
        {main: "#065f46", bg: "#ecfdf5", pbg: "rgba(6, 95, 70, 0.05)"},
        {main: "#b45309", bg: "#fffbeb", pbg: "rgba(180, 83, 9, 0.05)"}
    ];
    const theme = themes[Math.floor(Math.random() * themes.length)];
    document.documentElement.style.setProperty('--main-color', theme.main);
    document.documentElement.style.setProperty('--bg-color', theme.bg);
    document.documentElement.style.setProperty('--passage-bg', theme.pbg);

    // 2. مصفوفة الـ 40 سؤالاً
    const rawQuizData = [
    // --- التناظر اللفظي (10 أسئلة) ---
    { t: "تناظر لفظي", q: "رأس : تاج", opts: ["إصبع : خاتم", "قدم : حذاء", "أذن : قرط", "عنق : قلادة"], ans: "عنق : قلادة" },
    { t: "تناظر لفظي", q: "كعبة : طواف", opts: ["مسعى : سعي", "صلاة : ركوع", "ملعب : جري", "كتاب : قراءة"], ans: "ملعب : جري" },
    { t: "تناظر لفظي", q: "طائرة : مدرج", opts: ["قطار : سكة", "سفينة : ميناء", "سيارة : وقود", "دراجة : طريق"], ans: "سفينة : ميناء" },
    { t: "تناظر لفظي", q: "ريش : طائر", opts: ["جلد : تمساح", "صوف : خروف", "وبر : جمل", "شعر : رأس"], ans: "صوف : خروف" },
    { t: "تناظر لفظي", q: "غيم : مطر", opts: ["نار : دخان", "شمس : ضياء", "بذر : زرع", "اجتهاد : نجاح"], ans: "اجتهاد : نجاح" },
    { t: "تناظر لفظي", q: "عجين : خبز", opts: ["حديد : باب", "خشب : كرسي", "رمل : زجاج", "قطن : قماش"], ans: "رمل : زجاج" },
    { t: "تناظر لفظي", q: "ليث : أسد", opts: ["كتاب : دفتر", "بحر : نهر", "حسام : سيف", "شجاعة : جبن"], ans: "حسام : سيف" },
    { t: "تناظر لفظي", q: "مقال : كلمات", opts: ["مبنى : طوب", "لوحة : ألوان", "قصيدة : قوافي", "مؤتمر : أعضاء"], ans: "مبنى : طوب" },
    { t: "تناظر لفظي", q: "منشار : خشب", opts: ["مقص : قماش", "مبرد : حديد", "فأس : أرض", "مشرط : جراحة"], ans: "مقص : قماش" },
    { t: "تناظر لفظي", q: "أسود : ليل", opts: ["أبيض : نهار", "أحمر : دم", "أخضر : عشب", "أصفر : غيرة"], ans: "أبيض : نهار" },

    // --- المفردة الشاذة (7 أسئلة) ---
    { t: "المفردة الشاذة", q: "حدد المفردة الشاذة:", opts: ["جبر", "هندسة", "كيمياء", "إحصاء"], ans: "كيمياء" },
    { t: "المفردة الشاذة", q: "حدد المفردة الشاذة:", opts: ["صقر", "نسر", "بومة", "حمامة"], ans: "حمامة" },
    { t: "المفردة الشاذة", q: "حدد المفردة الشاذة:", opts: ["معدن", "بلاستيك", "ذهب", "فضة"], ans: "بلاستيك" },
    { t: "المفردة الشاذة", q: "حدد المفردة الشاذة:", opts: ["الزهرة", "المريخ", "القمر", "عطارد"], ans: "القمر" },
    { t: "المفردة الشاذة", q: "حدد المفردة الشاذة:", opts: ["سباحة", "قراءة", "جري", "قفز"], ans: "قراءة" },
    { t: "المفردة الشاذة", q: "حدد المفردة الشاذة:", opts: ["ميزان", "مسطرة", "ترمومتر", "قلم"], ans: "قلم" },
    { t: "المفردة الشاذة", q: "حدد المفردة الشاذة:", opts: ["فواكه", "عسل", "سكر", "ملح"], ans: "ملح" },

    // --- إكمال الجمل (8 أسئلة) ---
    { t: "إكمال الجمل", q: "إذا اعتاد المرء على ...... ، فإنه يصعب عليه ...... .", opts: ["الكسل - العمل", "الصدق - الكذب", "الخوف - المواجهة", "النجاح - الفشل"], ans: "الصدق - الكذب" },
    { t: "إكمال الجمل", q: "ليست ...... هي نهاية الطريق، بل هي ...... لبداية جديدة.", opts: ["الهزيمة - فرصة", "الخسارة - عائق", "المشكلة - حجر", "الوفاة - حياة"], ans: "الهزيمة - فرصة" },
    { t: "إكمال الجمل", q: "القراءة ...... للعقل، كما أن الرياضة ...... للجسم.", opts: ["غذاء - تنمية", "نور - نشاط", "تمرين - وقاية", "غذاء - تمرين"], ans: "غذاء - تمرين" },
    { t: "إكمال الجمل", q: "إن ...... التي لا تنكسر، هي التي تجعلنا ...... .", opts: ["العزيمة - نصل", "الرياح - نسقط", "الصعاب - أقوى", "الكلمات - نحزن"], ans: "الصعاب - أقوى" },
    { t: "إكمال الجمل", q: "احذر من ...... فإنه يقتل الوقت، ومن ...... فإنه يقتل العمل.", opts: ["الفراغ - التردد", "النوم - اللعب", "التسويف - الكسل", "الجهل - الكبر"], ans: "التسويف - الكسل" },
    { t: "إكمال الجمل", q: "لا يقاس ...... بمدى ما تحققه، بل بمدى ...... التي تغلبت عليها.", opts: ["الذكاء - الصعوبات", "النجاح - العقبات", "الفرد - المشاكل", "المال - الظروف"], ans: "النجاح - العقبات" },
    { t: "إكمال الجمل", q: "من أراد ...... فعليه بـ ...... .", opts: ["العلا - السهر", "الراحة - التعب", "الجنة - الصلاة", "الفوز - الاستعداد"], ans: "العلا - السهر" },
    { t: "إكمال الجمل", q: "اللسان ...... يقطع أكثر مما يقطع ...... .", opts: ["الجارح - السيف", "الطويل - السكين", "الحاد - المقص", "الصادق - النصل"], ans: "الجارح - السيف" },

    // --- استيعاب المقروء (5 أسئلة) ---
    { t: "استيعاب المقروء", q: "<div class='reading-passage'>يُعد الذكاء الاصطناعي أحد أبرز مجالات التطور التقني، حيث يسعى لمحاكاة القدرات الذهنية البشرية وأنماط عملها.</div> الهدف من الذكاء الاصطناعي هو:", opts: ["تقليد العقل البشري", "استبدال الإنسان", "صناعة الروبوتات", "تخزين البيانات"], ans: "تقليد العقل البشري" },
    { t: "استيعاب المقروء", q: "<div class='reading-passage'>تعتبر المياه الجوفية مورداً استراتيجياً هاماً، خاصة في المناطق الجافة التي تعاني من ندرة الأمطار السطحية.</div> يُستفاد من المياه الجوفية بشكل أكبر في:", opts: ["المناطق القطبية", "المناطق الجافة", "الغابات المطيرة", "المدن الساحلية"], ans: "المناطق الجافة" },
    { t: "استيعاب المقروء", q: "<div class='reading-passage'>الاستثمار في الكوادر البشرية من خلال التعليم والتدريب هو الضمان الحقيقي لتحقيق التنمية المستدامة في أي مجتمع.</div> الركيزة الأساسية للتنمية هي:", opts: ["الموارد الطبيعية", "بناء المصانع", "تطوير الإنسان", "زيادة الصادرات"], ans: "تطوير الإنسان" },
    { t: "استيعاب المقروء", q: "<div class='reading-passage'>اللغة العربية تمتاز بقدرتها الهائلة على الاشتقاق، مما يجعلها من أغنى لغات العالم بالمفردات والمصطلحات.</div> سبب غنى اللغة العربية هو:", opts: ["كثرة الناطقين بها", "قدرتها على الاشتقاق", "قدم تاريخها", "انتشارها الجغرافي"], ans: "قدرتها على الاشتقاق" },
    { t: "استيعاب المقروء", q: "<div class='reading-passage'>أثبتت الدراسات أن النوم المبكر لساعات كافية يعزز من كفاءة الجهاز المناعي ويحسن القدرة على التركيز الذهني.</div> النوم المبكر يؤدي إلى:", opts: ["تقوية المناعة", "زيادة الوزن", "توفير الطاقة", "علاج الأمراض"], ans: "تقوية المناعة" },

    // --- الخطأ السياقي (5 أسئلة) ---
    { t: "الخطأ السياقي", q: "المتفائل يرى فرصة في كل صعوبة، والمتشائم يرى صعوبة في كل منحة.", opts: ["المتفائل", "فرصة", "المتشائم", "منحة"], ans: "منحة" },
    { t: "الخطأ السياقي", q: "من كثرت عيوبه، قلّ أعداؤه، ومن زاد فضله كثر حُسّاده.", opts: ["عيوبه", "أعداؤه", "فضله", "حُسّاده"], ans: "أعداؤه" },
    { t: "الخطأ السياقي", q: "الصدق فضيلة تجعل صاحبها مكروهاً بين الناس، والكذب رذيلة ترفعه.", opts: ["فضيلة", "مكروهاً", "رذيلة", "ترفعه"], ans: "مكروهاً" },
    { t: "الخطأ السياقي", q: "إذا أردت أن تعلو فوق الناس، فاجعل نفسك فوقهم، وإذا أردت أن تقودهم فسر خلفهم.", opts: ["تعلو", "فوقهم", "تقودهم", "خلفهم"], ans: "فوقهم" },
    { t: "الخطأ السياقي", q: "يستطيع الإنسان أن يشتري سريراً بماله، لكنه لا يستطيع أن يشتري النوم بالدواء.", opts: ["يشتري", "سريراً", "النوم", "بالدواء"], ans: "بالدواء" },

    // --- الارتباط والاختلاف (5 أسئلة) ---
    { t: "الارتباط والاختلاف", q: "ما الكلمة التي ترتبط بكلمة (مستشفى):", opts: ["طبيب", "معلم", "مهندس", "فلاح"], ans: "طبيب" },
    { t: "الارتباط والاختلاف", q: "أي من الكلمات التالية تختلف عن البقية:", opts: ["ريال", "دينار", "درهم", "ذهب"], ans: "ذهب" },
    { t: "الارتباط والاختلاف", q: "العلاقة بين (الشمس والقمر) علاقة:", opts: ["تضاد", "تكامل", "تلازم", "تعاقب"], ans: "تعاقب" },
    { t: "الارتباط والاختلاف", q: "الكلمة التي لا تنتمي لمجموعة (وسائل التواصل):", opts: ["واتساب", "تويتر", "تليجرام", "فوتوشوب"], ans: "فوتوشوب" },
    { t: "الارتباط والاختلاف", q: "الارتباط الأقوى لـ (صيف) هو:", opts: ["برد", "حرارة", "ضباب", "ثلج"], ans: "حرارة" }
];

    const currentModelId = "Model_40_Advanced_V2";
    let sName, sEmail, currentIdx = 0, userScore = 0, timer, finalQuestions;

    const firebaseConfig = { apiKey: "AIzaSyBkCO7FDQXd89YDf843J4_AtvEFvzzt-R0", authDomain: "aztlg-494c3.firebaseapp.com", projectId: "aztlg-494c3", storageBucket: "aztlg-494c3.firebasestorage.app", messagingSenderId: "597051893949", appId: "1:597051893949:web:de5554ac900317a92b2fd4" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // التحقق ومنع الإعادة
    async function verifyAndStart() {
        const emailInput = document.getElementById('studentEmail').value.trim().toLowerCase();
        if(!emailInput.includes('@')) return alert("يرجى إدخال إيميل منصة مدرستي");
        
        document.getElementById('status-msg').innerText = "جاري التحقق... ⏳";

        try {
            const allowedDoc = await db.collection("allowed_students").doc(emailInput).get();
            if (!allowedDoc.exists) {
                showLock("هذا الإيميل غير مسجل. يرجى مراجعة المعلم.");
                return;
            }

            sName = allowedDoc.data().name;
            sEmail = emailInput;

            const resultCheck = await db.collection("student_results")
                .where("email", "==", sEmail)
                .where("model_id", "==", currentModelId).get();

            if (!resultCheck.empty) {
                showLock(`عذراً يا ${sName}، لقد أديت هذا التحدي مسبقاً.`);
                return;
            }

            // إظهار اسم المتحدي في الصفحة
            document.getElementById('challenger-display').innerText = `المتحدي: ${sName}`;
            
            finalQuestions = [...rawQuizData].sort(() => Math.random() - 0.5);
            document.getElementById('start-page').classList.add('hidden');
            document.getElementById('quiz-page').classList.remove('hidden');
            loadQuestion();
        } catch (e) { alert("خطأ في الاتصال بالسيرفر."); }
    }

    function showLock(msg) {
        document.getElementById('start-page').classList.add('hidden');
        document.getElementById('lock-screen').classList.remove('hidden');
        document.getElementById('lock-message').innerText = msg;
    }

    function loadQuestion() {
        if(currentIdx >= finalQuestions.length) return finish();
        const data = finalQuestions[currentIdx];
        
        document.getElementById('q-counter').innerText = `سؤال ${currentIdx+1} من ${finalQuestions.length}`;
        document.getElementById('q-type-label').innerText = data.t;
        document.getElementById('question-text').innerHTML = data.q;
        document.getElementById('next-btn').classList.add('hidden');
        
        const box = document.getElementById('options-area'); box.innerHTML = '';
        [...data.opts].sort(() => Math.random() - 0.5).forEach(o => {
            const d = document.createElement('div'); d.className = 'opt'; d.innerText = o;
            d.onclick = () => {
                clearInterval(timer);
                if(o === data.ans) userScore++;
                document.querySelectorAll('.opt').forEach(el => {
                    el.onclick = null;
                    if(el.innerText === data.ans) el.classList.add('correct');
                    else if(el.innerText === o) el.classList.add('wrong');
                });
                document.getElementById('next-btn').classList.remove('hidden');
            };
            box.appendChild(d);
        });
        startTimer();
    }

    function startTimer() {
        let s = 45; document.getElementById('timer').innerText = s;
        clearInterval(timer);
        timer = setInterval(() => {
            s--; document.getElementById('timer').innerText = s;
            if(s<=0) { clearInterval(timer); nextQuestion(); }
        }, 1000);
    }

    function nextQuestion() { currentIdx++; loadQuestion(); }

    async function finish() {
        document.getElementById('quiz-page').classList.add('hidden');
        document.getElementById('result-page').classList.remove('hidden');
        document.getElementById('final-greeting').innerText = `كفو يا ${sName}، تم الحفظ.`;
        document.getElementById('score-text').innerText = `${userScore} / ${finalQuestions.length}`;
        
        await db.collection("student_results").add({ 
            name: sName, email: sEmail, score: userScore, total: finalQuestions.length, 
            model_id: currentModelId, time: firebase.firestore.FieldValue.serverTimestamp() 
        });
    }
</script>
</body>
</html>
