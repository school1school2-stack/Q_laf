<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاكي القدرات اللفظي - أ/ عبدالعزيز الفيفي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root { 
            --main-color: #2c3e50; 
            --bg-color: #f4f7f6; 
            --white: #ffffff; 
            --correct: #27ae60; 
            --wrong: #e74c3c;
            --passage-bg: rgba(0,0,0,0.03);
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; padding: 20px; margin: 0; user-select: none; transition: background 0.5s; }
        .quiz-card { background: var(--white); width: 100%; max-width: 900px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.08); border-top: 12px solid var(--main-color); padding: 35px; position: relative; }
        .header { text-align: center; border-bottom: 2px solid #f0f0f0; margin-bottom: 25px; padding-bottom: 15px; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.02); padding: 15px 25px; border-radius: 10px; margin-bottom: 25px; border: 1px solid #eee; }
        
        /* تسيق اسم المتحدي */
        .challenger-box { 
    color: var(--main-color);
    font-weight: bold; 
}

        
        .q-type-badge { background: var(--main-color); color: white; padding: 8px 20px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; }
        .q-text { font-size: 1.6rem; font-weight: bold; text-align: center; line-height: 1.8; color: #2c3e50; padding: 10px; border-radius: 12px; min-height: 50px; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        
        .reading-passage { 
            background-color: var(--passage-bg); border-right: 6px solid var(--main-color); 
            padding: 20px; margin: 15px 0; border-radius: 8px; text-align: justify; 
            font-size: 1.2rem; line-height: 1.9; color: #333; width: 100%; box-sizing: border-box; display: block;
        }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 25px; }
        .opt { padding: 20px; border: 2px solid #ecf0f1; border-radius: 12px; cursor: pointer; text-align: center; font-size: 1.3rem; background: #fff; transition: 0.2s; color: #34495e; font-weight: 600; }
        .opt:hover { border-color: var(--main-color); background: #f9fbfb; }
        .correct { background: var(--correct) !important; color: white !important; border-color: var(--correct) !important; }
        .wrong { background: var(--wrong) !important; color: white !important; border-color: var(--wrong) !important; }
        .btn { background: var(--main-color); color: white; padding: 15px 55px; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1rem; font-weight: bold; }
        .hidden { display: none !important; }
        input { width: 80%; padding: 15px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 15px; text-align: center; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="quiz-card">
    <div class="header">
        <h3>ثانوية الأمير عبدالمجيد 🎓</h3>
        <h4>أ / عبدالعزيز الفيفي ✨</h4>
    </div>

    <div id="lock-screen" class="hidden" style="text-align: center; padding: 40px;">
        <h1 style="font-size: 4rem; margin: 0;">🚫</h1>
        <h2 style="color: var(--wrong);">تنبيه النظام</h2>
        <p id="lock-message" style="font-size: 1.3rem; line-height: 1.6; color: #555;"></p>
        <button class="btn" onclick="location.reload()" style="margin-top: 20px;">العودة</button>
    </div>

    <div id="start-page" style="text-align: center;">
        <p style="font-weight: bold; color: var(--main-color);">أدخل بريد منصة مدرستي لبدء التحدي</p>
        <input type="email" id="studentEmail" placeholder="sxxxxxxx@rb.moe.gov.sa">
        <br>
        <button class="btn" onclick="verifyAndStart()">دخول المنصة 🚀</button>
        <p id="status-msg" style="margin-top: 15px; font-weight: bold;"></p>
    </div>

    <div id="quiz-page" class="hidden">
        <div class="nav-bar">
            <div id="q-counter" style="font-weight: bold;"></div>
            <div id="challenger-display" class="challenger-box"></div> <div id="timer" style="font-weight: 900; font-size: 1.6rem; color: var(--wrong);">45</div>
        </div>
        <div style="text-align: right; margin-bottom: 10px;">
            <span id="q-type-label" class="q-type-badge"></span>
        </div>
        <div id="question-text" class="q-text"></div>
        <div id="options-area" class="options-grid"></div>
        <div style="text-align: center; margin-top: 35px;">
            <button id="next-btn" class="btn hidden" onclick="nextQuestion()">السؤال التالي ⮕</button>
        </div>
    </div>

    <div id="result-page" class="hidden" style="text-align: center;">
        <h2 id="final-greeting"></h2>
        <div style="font-size: 5rem; font-weight: bold; margin: 25px 0; color: var(--main-color);" id="score-text"></div>
        <button class="btn" onclick="location.reload()">خروج</button>
    </div>
</div>

<script>
    // 1. نظام الثيمات    // 1. نظام الثيمات المحدث
    const themes = [
        {main: "#800000", bg: "#fdf1f1", pbg: "rgba(128, 0, 0, 0.05)"},
        {main: "#2c3e50", bg: "#f4f7f6", pbg: "rgba(44, 62, 80, 0.05)"},
        {main: "#1e3a8a", bg: "#eff6ff", pbg: "rgba(30, 58, 138, 0.05)"},
        {main: "#065f46", bg: "#ecfdf5", pbg: "rgba(6, 95, 70, 0.05)"},
        {main: "#b45309", bg: "#fffbeb", pbg: "rgba(180, 83, 9, 0.05)"},
        {main: "#6d28d9", bg: "#f5f3ff", pbg: "rgba(109, 40, 217, 0.05)"}, // ثيم بنفسجي ملكي
        {main: "#0369a1", bg: "#f0f9ff", pbg: "rgba(3, 105, 161, 0.05)"}, // ثيم أزرق سماوي صافي
        {main: "#be185d", bg: "#fff1f2", pbg: "rgba(190, 24, 93, 0.05)"}, // ثيم وردي غامق
        {main: "#15803d", bg: "#f0fdf4", pbg: "rgba(21, 128, 61, 0.05)"}, // ثيم أخضر عشبي
        {main: "#4338ca", bg: "#eef2ff", pbg: "rgba(67, 56, 202, 0.05)"}, // ثيم نيلي وقور
        {main: "#334155", bg: "#f8fafc", pbg: "rgba(51, 65, 85, 0.05)"}, // ثيم رمادي احترافي
        {main: "#7c2d12", bg: "#fff7ed", pbg: "rgba(124, 45, 18, 0.05)"}, // ثيم خشبي دافئ
        {main: "#1e1b4b", bg: "#fdfdfd", pbg: "rgba(30, 27, 75, 0.03)"}  // ثيم كحلي ليلي
    ];

    // اختيار ثيم عشوائي عند التحميل
    const theme = themes[Math.floor(Math.random() * themes.length)];
    document.documentElement.style.setProperty('--main-color', theme.main);
    document.documentElement.style.setProperty('--bg-color', theme.bg);
    document.documentElement.style.setProperty('--passage-bg', theme.pbg);
];

    // 2. مصفوفة الـ 40 سؤالاً
    const rawQuizData = [
    // --- التناظر اللفظي (10 أسئلة) ---
    { t: "تناظر لفظي", q: "سفينة : مرساة", opts: ["سيارة : كوابح", "شجرة : جذور", "طائرة : أجنحة", "بناء : أعمدة"], ans: "سيارة : كوابح" },
    { t: "تناظر لفظي", q: "نحل : خلية", opts: ["صقر : وكر", "نمل : رمل", "أسد : غابة", "خيل : إسطبل"], ans: "خيل : إسطبل" },
    { t: "تناظر لفظي", q: "عين : رؤية", opts: ["أذن : سماع", "قدم : مشي", "عقل : تفكير", "لسان : تذوق"], ans: "أذن : سماع" },
    { t: "تناظر لفظي", q: "منزل : غرف", opts: ["مدينة : أحياء", "كتاب : صفحات", "مدرسة : فصول", "شجرة : أغصان"], ans: "كتاب : صفحات" },
    { t: "تناظر لفظي", q: "شمس : ضياء", opts: ["نار : حرارة", "قمر : ليل", "بحر : سمك", "نجم : سماء"], ans: "نار : حرارة" },
    { t: "تناظر لفظي", q: "صداقة : وفاء", opts: ["عداوة : مكر", "والدين : طاعة", "قراءة : ثقافة", "تجارة : ربح"], ans: "والدين : طاعة" },
    { t: "تناظر لفظي", q: "شبكة : صيد", opts: ["مفتاح : قفل", "سكين : قطع", "قلم : كتابة", "منظار : تقريب"], ans: "قلم : كتابة" },
    { t: "تناظر لفظي", q: "ذهب : بريق", opts: ["ورد : عطر", "نحاس : صلابة", "حديد : مغناطيس", "خشب : احتراق"], ans: "ورد : عطر" },
    { t: "تناظر لفظي", q: "تعب : نوم", opts: ["جوع : طعام", "عطش : ماء", "نجاح : فرح", "مرض : شفاء"], ans: "جوع : طعام" },
    { t: "تناظر لفظي", q: "كلمة : حرف", opts: ["مبنى : طوبة", "شارع : رصيف", "أسرة : أب", "جيش : قائد"], ans: "مبنى : طوبة" },

    // --- المفردة الشاذة (7 أسئلة) ---
    { t: "المفردة الشاذة", q: "حدد المفردة الشاذة:", opts: ["صوم", "صلاة", "حج", "كرم"], ans: "كرم" },
    { t: "المفردة الشاذة", q: "حدد المفردة الشاذة:", opts: ["الرياض", "جدة", "الدمام", "القاهرة"], ans: "القاهرة" },
    { t: "المفردة الشاذة", q: "حدد المفردة الشاذة:", opts: ["خارصين", "نحاس", "حديد", "بلاستيك"], ans: "بلاستيك" },
    { t: "المفردة الشاذة", q: "حدد المفردة الشاذة:", opts: ["فواكه", "تمر", "عصير", "خضار"], ans: "عصير" },
    { t: "المفردة الشاذة", q: "حدد المفردة الشاذة:", opts: ["عين", "أنف", "أذن", "قلب"], ans: "قلب" },
    { t: "المفردة الشاذة", q: "حدد المفردة الشاذة:", opts: ["رواية", "قصة", "ديوان", "مجلة"], ans: "ديوان" },
    { t: "المفردة الشاذة", q: "حدد المفردة الشاذة:", opts: ["دقيقة", "ساعة", "ثانية", "يوم"], ans: "يوم" },

    // --- إكمال الجمل (8 أسئلة) ---
    { t: "إكمال الجمل", q: "الحياة كـ ...... إذا لم تتقدم فيها فإنك ...... .", opts: ["القطار - تتوقف", "الدراجة - تسقط", "النهر - تغرق", "السباق - تخسر"], ans: "الدراجة - تسقط" },
    { t: "إكمال الجمل", q: "أعظم المحاربين ليسوا الذين ...... دائماً، بل الذين لا ...... أبداً.", opts: ["يفوزون - يستسلمون", "يقاتلون - يتعبون", "يهجمون - يخافون", "ينتصرون - يتراجعون"], ans: "يفوزون - يستسلمون" },
    { t: "إكمال الجمل", q: "لا تجعل عوائق الماضي ...... طريقك نحو ...... .", opts: ["تغلق - النجاح", "تسد - المستقبل", "تعيق - القمة", "تمنع - التطور"], ans: "تسد - المستقبل" },
    { t: "إكمال الجمل", q: "من أراد أن ...... فليبدأ بـ ...... .", opts: ["ينجح - الاجتهاد", "يتعلم - القراءة", "يطاع - المستطاع", "يسود - التواضع"], ans: "يطاع - المستطاع" },
    { t: "إكمال الجمل", q: "خير الناس ...... للناس، وأفضل الأعمال ...... .", opts: ["أنفعهم - أدومها", "أحبهم - أصعبها", "أكرمهم - أجملها", "أصدقهم - أوفاها"], ans: "أنفعهم - أدومها" },
    { t: "إكمال الجمل", q: "إن ...... مفتاح لكل باب مغلق، و ...... زاد لكل رحلة شاقة.", opts: ["الصبر - الأمل", "العلم - العمل", "المال - الذكاء", "الصدق - القوة"], ans: "الصبر - الأمل" },
    { t: "إكمال الجمل", q: "لا تكن ...... فتكسر، ولا تكن ...... فتعصر.", opts: ["صلباً - ليناً", "قوياً - ضعيفاً", "صادقاً - كاذباً", "حزيناً - فرحاً"], ans: "صلباً - ليناً" },
    { t: "إكمال الجمل", q: "العلم في ...... كالنقش في ...... .", opts: ["الصغر - الحجر", "الكبر - الماء", "المدرسة - الدفتر", "القلب - الصدر"], ans: "الصغر - الحجر" },

    // --- استيعاب المقروء (5 أسئلة) ---
    { t: "استيعاب المقروء", q: "<div class='reading-passage'>تعتبر الطاقة الشمسية من أهم مصادر الطاقة المتجددة، فهي طاقة نظيفة لا تنضب وصديقة للبيئة بشكل كامل.</div> تتميز الطاقة الشمسية بأنها:", opts: ["متجددة ونظيفة", "مكلفة جداً", "تنتهي بسرعة", "تلوث البيئة"], ans: "متجددة ونظيفة" },
    { t: "استيعاب المقروء", q: "<div class='reading-passage'>يعد الغذاء المتوازن حجر الزاوية في بناء جسم سليم، حيث يمد الإنسان بالعناصر الضرورية للنمو ومقاومة الأمراض.</div> فائدة الغذاء المتوازن:", opts: ["النمو والمناعة", "زيادة الوزن", "النوم الطويل", "تحسين المظهر"], ans: "النمو والمناعة" },
    { t: "استيعاب المقروء", q: "<div class='reading-passage'>لعبت الترجمة دوراً حيوياً في نقل العلوم والمعارف بين الحضارات، وكانت جسراً للتواصل الثقافي والعلمي.</div> وصفت الترجمة في النص بأنها:", opts: ["جسر للتواصل", "مهنة صعبة", "تاريخ قديم", "علم حديث"], ans: "جسر للتواصل" },
    { t: "استيعاب المقروء", q: "<div class='reading-passage'>تعتبر المحميات الطبيعية وسيلة هامة لحماية الحيوانات والنباتات المهددة بالانقراض من الأنشطة البشرية الجائرة.</div> الهدف من المحميات هو:", opts: ["حماية التنوع", "صيد الحيوانات", "بناء المصانع", "توسيع المدن"], ans: "حماية التنوع" },
    { t: "استيعاب المقروء", q: "<div class='reading-passage'>القراءة الواعية لا تقتصر على فك الرموز، بل هي عملية تفكير ونقد تهدف لاستخراج المعاني العميقة من النصوص.</div> القراءة الحقيقية تعني:", opts: ["التفكير والنقد", "سرعة الإنجاز", "حفظ الكلمات", "جمع الكتب"], ans: "التفكير والنقد" },

    // --- الخطأ السياقي (5 أسئلة) ---
    { t: "الخطأ السياقي", q: "الابتسامة طريق قصير للوصول لقلوب الآخرين، والعبوس جسر للفرار منهم.", opts: ["الابتسامة", "قصير", "العبوس", "جسر"], ans: "جسر" },
    { t: "الخطأ السياقي", q: "يجب أن تكون قدوة لغيرك في السلوك السيء لتنال احترامهم وتقديرهم.", opts: ["قدوة", "السيء", "احترامهم", "تقديرهم"], ans: "السيء" },
    { t: "الخطأ السياقي", q: "الاستغفار يفتح الأبواب المغلقة، ويجعل الهموم تزداد على الإنسان.", opts: ["يفتح", "المغلقة", "الهموم", "تزداد"], ans: "تزداد" },
    { t: "الخطأ السياقي", q: "القائد الناجح هو الذي يرى النجاح ملكاً له، ويرى الفشل مسؤولية الجميع.", opts: ["الناجح", "ملكاً له", "الفشل", "مسؤولية"], ans: "ملكاً له" },
    { t: "الخطأ السياقي", q: "من أراد النجاح فليصعد سلم الفشل، ومن أراد الفوز فليعتد الهزيمة.", opts: ["النجاح", "سلم", "الفشل", "الهزيمة"], ans: "الفشل" },

    // --- الارتباط والاختلاف (5 أسئلة) ---
    { t: "الارتباط والاختلاف", q: "ما الكلمة التي ترتبط بكلمة (مطار):", opts: ["قطار", "طائرة", "سفينة", "سيارة"], ans: "طائرة" },
    { t: "الارتباط والاختلاف", q: "أي من الكلمات التالية تختلف عن البقية:", opts: ["القمح", "الشعير", "الذرة", "التفاح"], ans: "التفاح" },
    { t: "الارتباط والاختلاف", q: "العلاقة الرابطة بين (الليل والنهار) هي:", opts: ["تضاد", "تعاقب", "تلازم", "تشابه"], ans: "تعاقب" },
    { t: "الارتباط والاختلاف", q: "الكلمة التي لا تنتمي لمجموعة (أدوات الكتابة):", opts: ["قلم", "مسطرة", "ورقة", "ممحاة"], ans: "ورقة" },
    { t: "الارتباط والاختلاف", q: "الارتباط الأقوى لـ (مدرسة) هو:", opts: ["كتب", "فصول", "طالب", "معلم"], ans: "طالب" }
];

    const currentModelId = "Model_40_Advanced_V2";
    let sName, sEmail, currentIdx = 0, userScore = 0, timer, finalQuestions;

    const firebaseConfig = { apiKey: "AIzaSyBkCO7FDQXd89YDf843J4_AtvEFvzzt-R0", authDomain: "aztlg-494c3.firebaseapp.com", projectId: "aztlg-494c3", storageBucket: "aztlg-494c3.firebasestorage.app", messagingSenderId: "597051893949", appId: "1:597051893949:web:de5554ac900317a92b2fd4" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // التحقق ومنع الإعادة
    async function verifyAndStart() {
        const emailInput = document.getElementById('studentEmail').value.trim().toLowerCase();
        if(!emailInput.includes('@')) return alert("يرجى إدخال إيميل منصة مدرستي");
        
        document.getElementById('status-msg').innerText = "جاري التحقق... ⏳";

        try {
            const allowedDoc = await db.collection("allowed_students").doc(emailInput).get();
            if (!allowedDoc.exists) {
                showLock("هذا الإيميل غير مسجل. يرجى مراجعة المعلم.");
                return;
            }

            sName = allowedDoc.data().name;
            sEmail = emailInput;

            const resultCheck = await db.collection("student_results")
                .where("email", "==", sEmail)
                .where("model_id", "==", currentModelId).get();

            if (!resultCheck.empty) {
                showLock(`عذراً يا ${sName}، لقد أديت هذا التحدي مسبقاً.`);
                return;
            }

            // إظهار اسم المتحدي في الصفحة
            document.getElementById('challenger-display').innerText = `المتحدي: ${sName}`;
            
            finalQuestions = [...rawQuizData].sort(() => Math.random() - 0.5);
            document.getElementById('start-page').classList.add('hidden');
            document.getElementById('quiz-page').classList.remove('hidden');
            loadQuestion();
        } catch (e) { alert("خطأ في الاتصال بالسيرفر."); }
    }

    function showLock(msg) {
        document.getElementById('start-page').classList.add('hidden');
        document.getElementById('lock-screen').classList.remove('hidden');
        document.getElementById('lock-message').innerText = msg;
    }

    function loadQuestion() {
        if(currentIdx >= finalQuestions.length) return finish();
        const data = finalQuestions[currentIdx];
        
        document.getElementById('q-counter').innerText = `سؤال ${currentIdx+1} من ${finalQuestions.length}`;
        document.getElementById('q-type-label').innerText = data.t;
        document.getElementById('question-text').innerHTML = data.q;
        document.getElementById('next-btn').classList.add('hidden');
        
        const box = document.getElementById('options-area'); box.innerHTML = '';
        [...data.opts].sort(() => Math.random() - 0.5).forEach(o => {
            const d = document.createElement('div'); d.className = 'opt'; d.innerText = o;
            d.onclick = () => {
                clearInterval(timer);
                if(o === data.ans) userScore++;
                document.querySelectorAll('.opt').forEach(el => {
                    el.onclick = null;
                    if(el.innerText === data.ans) el.classList.add('correct');
                    else if(el.innerText === o) el.classList.add('wrong');
                });
                document.getElementById('next-btn').classList.remove('hidden');
            };
            box.appendChild(d);
        });
        startTimer();
    }

    function startTimer() {
        let s = 45; document.getElementById('timer').innerText = s;
        clearInterval(timer);
        timer = setInterval(() => {
            s--; document.getElementById('timer').innerText = s;
            if(s<=0) { clearInterval(timer); nextQuestion(); }
        }, 1000);
    }

    function nextQuestion() { currentIdx++; loadQuestion(); }

    async function finish() {
        document.getElementById('quiz-page').classList.add('hidden');
        document.getElementById('result-page').classList.remove('hidden');
        document.getElementById('final-greeting').innerHTML = `جهدك اليوم محل تقدير، وبإصرار وعزيمة ستصل لمستوى أعلى في المرة المقبلة <br> يا (${sName}) 💐💐`;

        document.getElementById('score-text').innerText = `${userScore} / ${finalQuestions.length}`;
        
        await db.collection("student_results").add({ 
            name: sName, email: sEmail, score: userScore, total: finalQuestions.length, 
            model_id: currentModelId, time: firebase.firestore.FieldValue.serverTimestamp() 
        });
    }
</script>
</body>
</html>
